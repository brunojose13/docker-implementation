services:
  project-name-api:
    build: .
    container_name: project-name-api
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      project-name-database:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - project-name
    restart: unless-stopped

  project-name-database:
    image: mysql:8.4
    container_name: project-name-database
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - project-name-database:/var/lib/mysql
    networks:
      - project-name
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  project-name-database:
    driver: local

networks:
  project-name:
    driver: bridge
